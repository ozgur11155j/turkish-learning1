<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصويت شعب الإيزيدخان</title>
    <style>
        body {
            /* خلفية بتدرج ألوان علم إيزيدخان */
            background: linear-gradient(to bottom, #ff0000 20%, #ffffff 20% 80%, #ffffff 80%);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: auto;
            border-top: 10px solid #fdd835; /* لون الشمس */
        }
        h1 { color: #d32f2f; text-align: center; }
        .box {
            background: #f9f9f9;
            padding: 15px;
            margin: 15px 0;
            border-right: 5px solid #fdd835;
            border-radius: 8px;
        }
        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
        }
        footer { text-align: center; margin-top: 30px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☀️ تصويت شعب الإيزيدخان</h1>
        
        <div class="box">
            <h3>🗳️ خانة التصويت</h3>
            <p>ما هي الفكرة الأهم للمرحلة القادمة؟</p>
            <input type="radio" name="vote"> تطوير المراكز الثقافية<br>
            <input type="radio" name="vote"> دعم المشاريع الشبابية<br><br>
            <button onclick="alert('شكراً لتصويتك!')">إرسال التصويت</button>
        </div>

        <div class="box">
            <h3>💬 غرفة المناقشة</h3>
            <p>سيتم تفعيل الدردشة المباشرة قريباً...</p>
        </div>

        <footer>
            المطور: أوزغور السموقي
        </footer>
    </div>
</body>
</html>
